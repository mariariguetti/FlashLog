<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FlashLog</title>

    <!--    Link do Boostrap - Antes do CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--    Link do Bootstrap icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <!--Link das Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&display=swap"
          rel="stylesheet">


</head>
<body>


<div class="header">
    <div >
        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <!-- Barra lateral -->
        <div class="sidebar">
            <label for="menu-toggle" class="close-btn"><i class="bi bi-x-lg"></i></label>

            <ul class="log_bar">
                <li>
                    <a href="{{url_for('logistica')}}">Logística</a>
                    <a href="{{url_for('encomendas')}}">Encomendas</a>
                    <a href="{{url_for('clientes')}}">Clientes</a>
                    <a href="{{url_for('galpoes')}}">Galpões</a>
                </li>
                <li>
                    <img class="sidebar-img" src="/static/img/flash.png" height="150" width="255"/>
                </li>
            </ul>
        </div>
        <label for="menu-toggle" class="menu-icon"><i class="icon_menu bi bi-filter-left fs-4">Menu</i></label>
    </div>

    <div class="img-flash"><img src="/static/img/flash.png" height="85px" width="240px"/></div>
    <div>
        <a href="{{ url_for('home') }}">Início</a>
        {% if status_login == False %}
        <a href="{{ url_for('login') }}">Login</a>
        {% else %}
        <a href="#">Logado</a>
        {%endif%}
<!--        {% if current_user.is_authenticated %}-->
<!--        <a type="button" class="btn btn-primary" data-bs-toggle="modal"-->
<!--           data-bs-target="#modalLogout">{{current_user.nome}}</a>-->
<!--        {% else %}-->
<!--        -->
<!--        {% endif %} -->
    </div>


</div>
{% block conteudo %}
<div class="main">
    <img src="../static/img/texto.png" height="250" width="400"/>
    <div id="carouselExampleIndicators" class="carousel slide">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
                    aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                    aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                    aria-label="Slide 3"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img class="img_base rounded" src="/static/img/img1.jpg"/>
            </div>
            <div class="carousel-item">
                <img class="img_base rounded" src="/static/img/img2.jpg"/>
            </div>
            <div class="carousel-item">
                <img class="img_base rounded" src="/static/img/img3.jpg"/>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
                data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
                data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

</div>
{% endblock conteudo %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
