{% extends 'base.html' %}

{% block conteudo %}

<div class="pesquisa-encomendas">
    <button type="button" class="botao btn btn-primary" data-bs-toggle="modal" data-bs-target="#cadastro_galpao">
        Cadastrar galpão
    </button>
</div>
<div class="modal fade" id="cadastro_galpao" tabindex="-1" aria-labelledby="mostrar2" aria-hidden="true">
    <form id="form-cadastro_galpao" action="{{ url_for('cadastrar_galpao') }}" method="post">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="mostrar2">Cadastrar cliente</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="modal-cep">
                        <label>
                            <input id="form-cep" placeholder="Digite seu CEP" name="form-cep"
                                   class="form-modal">
                        </label>
                        <a type="submit" onclick="get_cep()" class="botao_cep btn btn-primary">Buscar</a>
                    </div>
                    <div>
                        <label>
                            <input id="form-cidade" placeholder="Cidade" name="form-cidade"
                                   class="form-modal" value="" disabled>
                        </label>
                        <label>
                            <input id="form-uf" placeholder="Estado" name="form-uf"
                                   class="form-modal" value="" disabled>
                        </label>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary"
                            data-bs-dismiss="modal">Fechar
                    </button>
                    <button type="submit" class="btn btn-info">Lançar
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

<table class="table table-dark table-striped-columns">
    <thead>
    <tr>
        <th scope="col">ID</th>
        <th scope="col">Cidade</th>
        <th scope="col">Estado</th>
        <th scope="col">Ações</th>
    </tr>
    </thead>
    <tbody>
    {% for i in var_galpoes %}
    <tr>
        <td>{{i["id_galpao"]}}</td>
        <td>{{i["cidade"]}}</td>
        <td>{{i["estado"]}}</td>
        <td>
            <a data-bs-toggle="modal" data-bs-target="#editar_galp{{i['id_galpao']}}"><i
                    class="bi bi-pencil-square text-primary fs-6"></i></a>
        </td>
    </tr>
    <div class="modal fade" id="editar_galp{{i['id_galpao']}}" tabindex="-1" aria-labelledby="edit_ga{{i['id_galpao']}}"
         aria-hidden="true">
        <form id="form-cadastro" action="{{ url_for('editar_galpao',var_id = i['id_galpao']) }}" method="post">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="edit_ga{{i['id_galpao']}}">Editar Galpão</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="modal-cep">
                        <label>
                            <input id="form-cep1" placeholder="Digite seu CEP" name="form-cep"
                                   class="form-modal">
                        </label>
                        <a type="submit" onclick="get_cep1()" class="botao_cep btn btn-primary">Buscar</a>
                    </div>
                    <div>
                        <label>
                            <input id="form-cidade1" placeholder="Cidade" name="form-cidade"
                                   class="form-modal" value="{{i['cidade']}}" disabled>
                        </label>
                        <label>
                            <input id="form-uf1" placeholder="Estado" name="form-uf"
                                   class="form-modal" value="{{i['estado']}}" disabled>
                        </label>
                    </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                                data-bs-dismiss="modal">Fechar
                        </button>
                        <button type="submit" class="btn btn-info">Lançar
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
    {% endfor %}
    </tbody>
</table>

<script src="/static/js/get_cep.js"></script>
{% endblock conteudo %}
